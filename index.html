    <title>Ops Control</title>
    <meta name="description" content="Operations console for every agent, task, automation, skill and plugin across your ventures." />
    <script>
      // Self-host persistence shim.
      // OpsControl reads `window.storage` at module load and uses it for
      // get(key) -> {value} | null  and  set(key, stringValue).
      // We back it with localStorage so board state persists across sessions
      // in this browser. Defined here so it exists before the bundle loads.
      window.storage = {
        get: function (k) {
          var v = localStorage.getItem(k);
          return Promise.resolve(v == null ? null : { value: v });
        },
        set: function (k, v) {
          try { localStorage.setItem(k, v); } catch (e) {}
          return Promise.resolve();
        },
      };
    </script>

* { box-sizing: border-box; }
.oc-root {
  --bg:#0B0F17; --panel:#131A26; --panel2:#1A2330; --border:#232E3E;
  --text:#E6E9F0; --muted:#8893A6; --dim:#5A6577; --accent:#4C82FB;
  font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text);
  min-height:100vh; width:100%;
}
.oc-wrap { max-width:1180px; margin:0 auto; padding:22px 18px 80px; }
.disp { font-family:'Archivo',sans-serif; }
.mono { font-family:'IBM Plex Mono',monospace; }

/* header */
.oc-head { display:flex; align-items:center; gap:14px; flex-wrap:wrap; padding-bottom:18px; }
.oc-mark { display:flex; align-items:center; gap:11px; }
.oc-orb { width:13px; height:13px; border-radius:50%; background:var(--accent);
  box-shadow:0 0 0 4px rgba(76,130,251,.15); animation:beat 2.4s ease-in-out infinite; }
.oc-title { font-size:19px; font-weight:800; letter-spacing:.13em; line-height:1; }
.oc-sub { font-size:10.5px; letter-spacing:.32em; color:var(--dim); margin-top:5px; }
.oc-clock { text-align:right; }
.oc-feed { margin-left:auto; display:flex; align-items:center; gap:8px; background:var(--panel);
  border:1px solid var(--border); border-radius:999px; padding:7px 13px; }
.oc-feed-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.oc-feed-txt { font-size:10.5px; letter-spacing:.14em; color:var(--muted); }
.oc-time { font-size:15px; font-weight:500; letter-spacing:.04em; }
.oc-date { font-size:10.5px; letter-spacing:.16em; color:var(--dim); margin-top:3px; text-transform:uppercase; }

/* signal strip */
.oc-signal { display:flex; gap:3px; height:10px; margin:6px 0 20px; }
.oc-seg { flex:1; border-radius:2px; min-width:3px; transition:transform .15s; }
.oc-seg:hover { transform:scaleY(1.6); }

/* stats */
.oc-stats { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:18px; }
.oc-stat { background:var(--panel); border:1px solid var(--border); border-radius:12px;
  padding:13px 15px; cursor:pointer; transition:border-color .15s, background .15s; text-align:left; }
.oc-stat:hover { border-color:#33415A; }
.oc-stat.on { background:var(--panel2); border-color:var(--accent); }
.oc-stat-n { font-size:26px; font-weight:800; line-height:1; font-family:'Archivo',sans-serif; }
.oc-stat-l { font-size:10px; letter-spacing:.18em; color:var(--muted); margin-top:7px; text-transform:uppercase; }

/* toolbar */
.oc-bar { display:flex; gap:9px; flex-wrap:wrap; align-items:center; margin-bottom:18px; }
.oc-srch { flex:1; min-width:160px; display:flex; align-items:center; gap:9px;
  background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:0 12px; height:40px; }
.oc-srch input { background:none; border:none; outline:none; color:var(--text); font-size:13.5px; width:100%; font-family:inherit; }
.oc-srch input::placeholder { color:var(--dim); }
.oc-sel { position:relative; }
.oc-sel select { appearance:none; background:var(--panel); border:1px solid var(--border);
  color:var(--text); border-radius:10px; height:40px; padding:0 32px 0 13px; font-size:12.5px;
  font-family:inherit; cursor:pointer; outline:none; }
.oc-sel select:focus { border-color:var(--accent); }
.oc-sel .chev { position:absolute; right:11px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--muted); }
.oc-toggle { display:flex; background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:3px; height:40px; }
.oc-toggle button { background:none; border:none; color:var(--muted); font-size:11px; letter-spacing:.1em;
  padding:0 12px; border-radius:7px; cursor:pointer; font-family:inherit; text-transform:uppercase; font-weight:600; }
.oc-toggle button.on { background:var(--panel2); color:var(--text); }
.oc-new { margin-left:auto; display:flex; align-items:center; gap:7px; background:var(--accent); color:#fff;
  border:none; border-radius:10px; height:40px; padding:0 16px; font-size:13px; font-weight:600;
  cursor:pointer; font-family:inherit; transition:filter .15s; }
.oc-new:hover { filter:brightness(1.1); }
.oc-iconbtn { width:40px; height:40px; display:flex; align-items:center; justify-content:center;
  background:var(--panel); border:1px solid var(--border); border-radius:10px; color:var(--muted);
  cursor:pointer; transition:border-color .15s; }
.oc-iconbtn:hover { border-color:#33415A; color:var(--text); }

/* groups + rows */
.oc-group { margin-bottom:26px; }
.oc-ghead { display:flex; align-items:center; gap:11px; margin-bottom:11px; }
.oc-gbar { width:3px; height:15px; border-radius:2px; }
.oc-gname { font-size:12px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; }
.oc-gcount { font-size:11px; color:var(--dim); margin-left:2px; }
.oc-grule { flex:1; height:1px; background:var(--border); }

.oc-row { display:flex; align-items:center; gap:13px; background:var(--panel); border:1px solid var(--border);
  border-left-width:3px; border-radius:11px; padding:13px 15px; margin-bottom:8px; transition:border-color .15s, background .15s; }
.oc-row:hover { background:var(--panel2); }
.oc-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
.oc-dot.pulse { animation:ring 1.9s ease-out infinite; }
.oc-rowmain { min-width:0; flex:1; }
.oc-rowname { font-size:14px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.oc-rowmeta { display:flex; align-items:center; gap:9px; margin-top:5px; flex-wrap:wrap; }
.oc-kind { display:inline-flex; align-items:center; gap:5px; font-size:10.5px; letter-spacing:.06em;
  color:var(--muted); text-transform:uppercase; font-weight:600; }
.oc-cad { font-size:11px; color:var(--muted); }
.oc-when { font-size:11px; color:var(--dim); }
.oc-sep { color:#2C3A4E; }
.oc-note { font-size:11.5px; color:var(--dim); margin-top:6px; line-height:1.45; }
.oc-acts { display:flex; gap:4px; flex-shrink:0; }
.oc-act { width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  background:none; border:1px solid transparent; border-radius:8px; color:var(--dim); cursor:pointer; transition:.13s; }
.oc-act:hover { color:var(--text); background:#0E141F; border-color:var(--border); }
.oc-act.danger:hover { color:#F87171; }

/* empty */
.oc-empty { text-align:center; padding:60px 20px; border:1px dashed var(--border); border-radius:14px; }
.oc-empty h3 { font-family:'Archivo',sans-serif; font-size:17px; margin:0 0 8px; }
.oc-empty p { color:var(--muted); font-size:13px; margin:0 0 18px; }

/* modal */
.oc-overlay { position:fixed; inset:0; background:rgba(5,8,13,.72); backdrop-filter:blur(3px);
  display:flex; align-items:flex-start; justify-content:center; padding:40px 16px; z-index:50; overflow-y:auto; }
.oc-modal { width:100%; max-width:480px; background:var(--panel); border:1px solid var(--border);
  border-radius:16px; padding:22px; }
.oc-mhead { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.oc-mtitle { font-family:'Archivo',sans-serif; font-size:16px; font-weight:700; letter-spacing:.04em; }
.oc-field { margin-bottom:14px; }
.oc-label { display:block; font-size:10.5px; letter-spacing:.16em; color:var(--muted);
  text-transform:uppercase; margin-bottom:7px; font-weight:600; }
.oc-input, .oc-area, .oc-fsel { width:100%; background:var(--bg); border:1px solid var(--border); color:var(--text);
  border-radius:9px; padding:10px 12px; font-size:13.5px; font-family:inherit; outline:none; }
.oc-input:focus, .oc-area:focus, .oc-fsel:focus { border-color:var(--accent); }
.oc-area { resize:vertical; min-height:64px; line-height:1.5; }
.oc-grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.oc-mfoot { display:flex; gap:10px; margin-top:8px; }
.oc-btn { flex:1; height:42px; border-radius:10px; font-size:13.5px; font-weight:600; cursor:pointer; font-family:inherit; border:1px solid var(--border); }
.oc-btn.ghost { background:none; color:var(--muted); }
.oc-btn.ghost:hover { color:var(--text); border-color:#33415A; }
.oc-btn.solid { background:var(--accent); color:#fff; border-color:var(--accent); }
.oc-btn.solid:hover { filter:brightness(1.1); }

/* settings menu */
.oc-menu { position:absolute; right:0; top:46px; background:var(--panel); border:1px solid var(--border);
  border-radius:11px; padding:6px; width:180px; z-index:20; }
.oc-menu button { display:flex; align-items:center; gap:9px; width:100%; background:none; border:none;
  color:var(--text); font-size:12.5px; padding:9px 10px; border-radius:7px; cursor:pointer; font-family:inherit; text-align:left; }
.oc-menu button:hover { background:var(--panel2); }
.oc-menupos { position:relative; }

@keyframes beat { 0%,100%{opacity:1} 50%{opacity:.45} }
@keyframes ring {
  0% { box-shadow:0 0 0 0 currentColor; }
  70% { box-shadow:0 0 0 5px transparent; }
  100% { box-shadow:0 0 0 0 transparent; }
}
@media (max-width:560px) {
  .oc-stats { grid-template-columns:1fr 1fr; }
  .oc-feed { margin-left:0; order:3; flex:1; justify-content:center; }
  .oc-clock { order:2; }
  .oc-new { margin-left:0; width:100%; justify-content:center; }
  .oc-grid2 { grid-template-columns:1fr; }
  .oc-acts { gap:0; }
}
@media (prefers-reduced-motion:reduce) {
  .oc-orb, .oc-dot.pulse { animation:none !important; }
}
